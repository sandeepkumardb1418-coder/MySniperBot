name: Telegram 360 AI Engine

on:
  workflow_dispatch:
  schedule:
    # सुबह 8:45 AM से 3:45 PM (IST) तक हर 15 मिनट में
    # UTC में यह 3:15 AM से 10:15 AM होता है
    - cron: '*/15 3-10 * * 1-5'

jobs:
  run-trading-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write # मेमोरी डायरी सेव करने की परमिशन

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python_version: '3.10'

      - name: Install Packages
        run: pip install pandas yfinance requests pytz

      - name: Run Telegram AI Engine
        run: python algo.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DHAN_CLIENT_ID: ${{ secrets.DHAN_CLIENT_ID }}
          DHAN_ACCESS_TOKEN: ${{ secrets.DHAN_ACCESS_TOKEN }}

      # 🚨 मेमोरी लॉस का इलाज (Auto-Save)
      - name: Commit and Push Memory
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          git add memory.json || true
          git commit -m "🤖 AI Memory Updated" || echo "No changes to commit"
          git push || true
