name: 360_AI_Sniper_Bot

on:
  schedule:
    # नियम 6 & 8: 9:30 AM (IST) पर पहली बार जगेगा, फिर हर 15 मिनट में चेक करेगा
    # (UTC 4:00 AM = IST 9:30 AM)
    - cron: '0,15,30,45 4-10 * * 1-5'
  workflow_dispatch: # मोबाइल से मैन्युअल चलाने के लिए

jobs:
  sniper_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install pandas yfinance requests pytz

      - name: Execute 360 AI Engine
        env:
          # नियम 1: ऑटो कैपिटल एक्सेस
          DHAN_CLIENT_ID: ${{ secrets.DHAN_CLIENT_ID }}
          DHAN_ACCESS_TOKEN: ${{ secrets.DHAN_ACCESS_TOKEN }}
        run: python algo.py
