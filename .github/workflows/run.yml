name: Execute 360 AI Engine

on:
  workflow_dispatch:
  schedule:
    # यह सोमवार से शुक्रवार (1-5) 9:45 AM IST से 3:15 PM IST तक हर 15 मिनट में चलेगा
    - cron: '*/15 4-9 * * 1-5'

jobs:
  run-ai-engine:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python_version: '3.10'

      - name: Install Libraries
        run: pip install pandas yfinance requests

      - name: 1. Execute AI Engine (Scan & Trade)
        run: python algo.py
        env:
          DHAN_CLIENT_ID: ${{ secrets.DHAN_CLIENT_ID }}
          DHAN_ACCESS_TOKEN: ${{ secrets.DHAN_ACCESS_TOKEN }}

      - name: 2. Execute AI Risk Manager (SL/Target)
        run: python risk_manager.py
        env:
          DHAN_CLIENT_ID: ${{ secrets.DHAN_CLIENT_ID }}
          DHAN_ACCESS_TOKEN: ${{ secrets.DHAN_ACCESS_TOKEN }}
